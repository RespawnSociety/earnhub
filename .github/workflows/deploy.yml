name: Deploy SpawnVault to VPS
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  deploy:
    runs-on: self-hosted  
    steps:
      - name: Pull latest code & sync to public_html
        env:
          HOME: /root
        run: |
          REPO_DIR=/home/el/web/spawnvault.respawnsociety.web.id/repo
          WEB_ROOT=/home/el/web/spawnvault.respawnsociety.web.id/public_html
          git config --global --add safe.directory "$REPO_DIR"
          if [ ! -d "$REPO_DIR/.git" ]; then
            git clone https://github.com/RespawnSociety/earnhub.git "$REPO_DIR"
          fi
          cd "$REPO_DIR"
          git fetch origin
          git reset --hard origin/main
          mkdir -p "$WEB_ROOT"
          rsync -av --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='*.md' \
            --exclude='*.xlsx' \
            --exclude='.gitignore' \
            "$REPO_DIR"/ "$WEB_ROOT"/
          echo "Deploy selesai!"
